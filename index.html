<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ledger — Excel &amp; Power BI Document Vault</title>

<!-- Bootstrap 5 -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>

<!-- React -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js"></script>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root{
    --ink:#0F1720;
    --panel:#152029;
    --panel-2:#1B2732;
    --paper:#F6F4EC;
    --paper-dim:#EAE6D9;
    --grid-line:#2A3B47;
    --excel:#1F8A5B;
    --excel-dim:#164D34;
    --pbi:#D9A441;
    --pbi-dim:#8C6A24;
    --rust:#C1553A;
    --text:#E7E2D6;
    --text-muted:#8B96A0;
    --text-ink:#1B241D;
  }

  html,body{ height:100%; }
  body{
    background:
      linear-gradient(var(--ink), var(--ink)) fixed,
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,0.028) 40px) fixed,
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,0.028) 40px) fixed;
    color:var(--text);
    font-family:'Inter', system-ui, sans-serif;
    min-height:100vh;
  }

  h1,h2,h3,h4,.brand,.display{
    font-family:'Space Grotesk', sans-serif;
  }

  .mono{
    font-family:'JetBrains Mono', monospace;
    font-variant-numeric: tabular-nums;
  }

  /* ---------- Top bar ---------- */
  .topbar{
    background:var(--panel);
    border-bottom:1px solid var(--grid-line);
    position:sticky;
    top:0;
    z-index:40;
  }
  .brand-mark{
    width:38px;height:38px;
    border:2px solid var(--paper);
    border-radius:4px;
    display:flex;align-items:center;justify-content:center;
    position:relative;
    flex-shrink:0;
  }
  .brand-mark::before, .brand-mark::after{
    content:"";
    position:absolute;
    background:var(--paper);
  }
  .brand-mark::before{ width:1px; height:60%; left:50%; }
  .brand-mark::after{ height:1px; width:60%; top:50%; }
  .brand-title{ font-weight:700; font-size:1.15rem; letter-spacing:0.01em; color:var(--paper); }
  .brand-sub{ font-size:0.68rem; color:var(--text-muted); letter-spacing:0.14em; text-transform:uppercase; }

  .search-wrap{ max-width:420px; }
  .search-wrap input{
    background:var(--panel-2);
    border:1px solid var(--grid-line);
    color:var(--text);
  }
  .search-wrap input::placeholder{ color:var(--text-muted); }
  .search-wrap input:focus{
    background:var(--panel-2);
    color:var(--text);
    border-color:var(--pbi);
    box-shadow:0 0 0 0.2rem rgba(217,164,65,0.18);
  }

  /* ---------- Layout ---------- */
  .shell{ max-width:1360px; }

  /* ---------- Sidebar ---------- */
  .side-card{
    background:var(--panel);
    border:1px solid var(--grid-line);
    border-radius:8px;
  }
  .index-tab{
    display:flex; align-items:center; gap:10px;
    padding:10px 14px;
    border-radius:6px;
    color:var(--text-muted);
    cursor:pointer;
    border:1px solid transparent;
    transition: background .15s ease, color .15s ease;
    font-size:0.92rem;
  }
  .index-tab:hover{ background:var(--panel-2); color:var(--text); }
  .index-tab.active{
    background:var(--panel-2);
    color:var(--paper);
    border-color:var(--grid-line);
  }
  .swatch{ width:10px; height:10px; border-radius:2px; flex-shrink:0; }
  .count-pill{
    margin-left:auto;
    font-family:'JetBrains Mono', monospace;
    font-size:0.72rem;
    color:var(--text-muted);
  }

  .ledger-stat{
    border-top:1px dashed var(--grid-line);
    padding-top:12px;
    margin-top:12px;
  }
  .ledger-row{
    display:flex; justify-content:space-between;
    font-size:0.82rem;
    color:var(--text-muted);
    padding:3px 0;
  }
  .ledger-row span:last-child{ color:var(--text); font-family:'JetBrains Mono', monospace; }

  /* ---------- Upload dropzone ---------- */
  .dropzone{
    border:2px dashed var(--grid-line);
    border-radius:10px;
    background:var(--panel);
    padding:22px;
    text-align:center;
    transition: border-color .15s ease, background .15s ease;
    cursor:pointer;
  }
  .dropzone.drag-over{
    border-color:var(--pbi);
    background:var(--panel-2);
  }
  .dropzone .glyph{
    width:44px;height:44px;
    margin:0 auto 10px;
    border:2px solid var(--text-muted);
    border-radius:4px;
    position:relative;
  }
  .dropzone .glyph::before{
    content:"";
    position:absolute;
    left:50%; top:22%;
    width:1px; height:40%;
    background:var(--text-muted);
    transform:translateX(-50%);
  }
  .dropzone .glyph::after{
    content:"";
    position:absolute;
    left:22%; top:38%;
    width:56%; height:1px;
    background:var(--text-muted);
    transform: rotate(45deg) scaleX(0.55) translateY(-6px);
    box-shadow: 0 0 0 0 transparent;
  }

  /* ---------- Document card ---------- */
  .doc-card{
    background:var(--paper);
    color:var(--text-ink);
    border-radius:6px;
    position:relative;
    overflow:hidden;
    height:100%;
    display:flex;
    flex-direction:column;
    box-shadow: 0 1px 0 rgba(0,0,0,0.15), 0 6px 14px rgba(0,0,0,0.18);
    transition: transform .15s ease, box-shadow .15s ease;
  }
  .doc-card:hover{
    transform: translateY(-3px);
    box-shadow: 0 3px 0 rgba(0,0,0,0.18), 0 14px 26px rgba(0,0,0,0.30);
  }
  /* folder corner-fold tab */
  .doc-card .fold{
    position:absolute; top:0; right:0;
    width:0; height:0;
    border-style:solid;
    border-width:0 34px 34px 0;
    border-color:transparent var(--fold-color, var(--excel)) transparent transparent;
  }
  .doc-card .fold-label{
    position:absolute; top:5px; right:-24px;
    transform:rotate(45deg);
    font-size:0.58rem;
    font-weight:700;
    letter-spacing:0.05em;
    color:#fff;
  }
  .doc-card-body{ padding:18px 16px 14px; flex:1; display:flex; flex-direction:column;}
  .doc-name{
    font-weight:600;
    font-size:0.95rem;
    line-height:1.3;
    margin-bottom:6px;
    word-break:break-word;
    padding-right:20px;
  }
  .doc-meta{
    font-size:0.72rem;
    color:#6b6152;
    font-family:'JetBrains Mono', monospace;
    margin-bottom:2px;
  }
  .doc-badge{
    display:inline-flex; align-items:center; gap:5px;
    font-size:0.66rem;
    font-weight:600;
    letter-spacing:0.05em;
    text-transform:uppercase;
    padding:3px 8px;
    border-radius:20px;
    margin-top:10px;
    width:fit-content;
  }
  .doc-badge.excel{ background:rgba(31,138,91,0.14); color:#166B47; }
  .doc-badge.pbi{ background:rgba(217,164,65,0.18); color:#8C6A24; }

  .doc-card-footer{
    border-top:1px solid var(--paper-dim);
    display:flex;
  }
  .doc-card-footer button{
    flex:1;
    background:transparent;
    border:0;
    padding:9px 0;
    font-size:0.76rem;
    font-weight:600;
    color:#4a4436;
    letter-spacing:0.02em;
    transition: background .12s ease;
  }
  .doc-card-footer button:first-child{ border-right:1px solid var(--paper-dim); }
  .doc-card-footer button:hover{ background:var(--paper-dim); }
  .doc-card-footer button.danger:hover{ color:var(--rust); }

  /* ---------- Toolbar ---------- */
  .toolbar-btn{
    background:var(--panel);
    border:1px solid var(--grid-line);
    color:var(--text-muted);
    font-size:0.8rem;
  }
  .toolbar-btn.active, .toolbar-btn:hover{
    background:var(--panel-2);
    color:var(--paper);
    border-color:var(--grid-line);
  }

  .section-title{
    font-size:0.72rem;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--text-muted);
    margin-bottom:10px;
  }

  /* ---------- Empty state ---------- */
  .empty-state{
    border:1px dashed var(--grid-line);
    border-radius:10px;
    padding:60px 24px;
    text-align:center;
    color:var(--text-muted);
  }

  .scrollbar-thin::-webkit-scrollbar{ width:6px; }
  .scrollbar-thin::-webkit-scrollbar-thumb{ background:var(--grid-line); border-radius:4px; }

  @media (max-width: 767px){
    .side-card{ margin-bottom:16px; }
  }
</style>
</head>

<script type="text/babel">
const { useState, useMemo, useRef, useCallback } = React;

/* ---------------- helpers ---------------- */

const EXCEL_EXT = ["xlsx","xls","xlsm","csv"];
const PBI_EXT = ["pbix","pbit"];

function classify(filename){
  const ext = filename.split(".").pop().toLowerCase();
  if (EXCEL_EXT.includes(ext)) return "excel";
  if (PBI_EXT.includes(ext)) return "pbi";
  return "other";
}

function formatBytes(bytes){
  if (bytes === 0) return "0 KB";
  const units = ["B","KB","MB","GB"];
  const i = Math.min(Math.floor(Math.log(bytes) / Math.log(1024)), units.length - 1);
  return (bytes / Math.pow(1024, i)).toFixed(i === 0 ? 0 : 1) + " " + units[i];
}

function formatDate(d){
  return d.toLocaleDateString(undefined, { month:"short", day:"2-digit", year:"numeric" });
}

/* Convert an embedded base64 payload back into a real File object,
   so uploaded documents are genuinely storable/downloadable from this page. */
function base64ToFile(base64, filename, mime){
  const byteChars = atob(base64);
  const byteNumbers = new Array(byteChars.length);
  for (let i = 0; i < byteChars.length; i++){
    byteNumbers[i] = byteChars.charCodeAt(i);
  }
  const byteArray = new Uint8Array(byteNumbers);
  return new File([byteArray], filename, { type: mime });
}

function Fold({ type }){
  const color = type === "excel" ? "var(--excel)" : "var(--pbi)";
  const label = type === "excel" ? "XLS" : "PBI";
  return (
    <React.Fragment>
      <div className="fold" style={{ ["--fold-color"]: color }}></div>
      <div className="fold-label">{label}</div>
    </React.Fragment>
  );
}

function DocCard({ doc, onDelete, onDownload }){
  const badgeClass = doc.type === "excel" ? "excel" : "pbi";
  const badgeText = doc.type === "excel" ? "Excel Workbook" : "Power BI Report";
  return (
    <div className="doc-card">
      <Fold type={doc.type} />
      <div className="doc-card-body">
        <div className="doc-name">{doc.name}</div>
        <div className="doc-meta">{formatBytes(doc.size)} &middot; added {formatDate(doc.added)}</div>
        <span className={"doc-badge " + badgeClass}>
          <span className="swatch" style={{background: doc.type === "excel" ? "#1F8A5B" : "#D9A441"}}></span>
          {badgeText}
        </span>
      </div>
      <div className="doc-card-footer">
        <button onClick={() => onDownload(doc)}>Download</button>
        <button className="danger" onClick={() => onDelete(doc.id)}>Remove</button>
      </div>
    </div>
  );
}

function buildInitialState(){
  const file = base64ToFile(EMBEDDED_FILE_B64, EMBEDDED_FILE_NAME, XLSX_MIME);
  const doc = {
    id: "doc-restaurant-sales",
    name: EMBEDDED_FILE_NAME,
    type: classify(EMBEDDED_FILE_NAME),
    size: file.size,
    added: new Date(),
  };
  return { docs: [doc], filesById: { [doc.id]: file } };
}

function App(){
  const initial = useMemo(buildInitialState, []);
  const [docs, setDocs] = useState(initial.docs);
  const [filesById, setFilesById] = useState(initial.filesById); // id -> actual File object (for real uploads)
  const [activeFilter, setActiveFilter] = useState("all");
  const [query, setQuery] = useState("");
  const [sortBy, setSortBy] = useState("recent");
  const [dragOver, setDragOver] = useState(false);
  const [toast, setToast] = useState(null);
  const fileInputRef = useRef(null);

  const showToast = (msg) => {
    setToast(msg);
    window.clearTimeout(showToast._t);
    showToast._t = window.setTimeout(() => setToast(null), 2600);
  };

  const addFiles = useCallback((fileList) => {
    const incoming = Array.from(fileList);
    const accepted = [];
    const rejected = [];

    incoming.forEach((f) => {
      const type = classify(f.name);
      if (type === "other") { rejected.push(f.name); return; }
      const id = "doc-" + Date.now() + "-" + Math.random().toString(36).slice(2,8);
      accepted.push({ id, name: f.name, type, size: f.size, added: new Date(), fileRef: f });
    });

    if (accepted.length){
      setDocs(prev => [...accepted.map(a => ({id:a.id,name:a.name,type:a.type,size:a.size,added:a.added})), ...prev]);
      setFilesById(prev => {
        const next = { ...prev };
        accepted.forEach(a => { next[a.id] = a.fileRef; });
        return next;
      });
      showToast(accepted.length + (accepted.length === 1 ? " file added to the vault" : " files added to the vault"));
    }
    if (rejected.length){
      showToast("Skipped " + rejected.length + " unsupported file" + (rejected.length > 1 ? "s" : "") + " — only .xlsx, .xls, .xlsm, .csv, .pbix, .pbit are accepted");
    }
  }, []);

  const handleDelete = (id) => {
    setDocs(prev => prev.filter(d => d.id !== id));
    setFilesById(prev => {
      const next = { ...prev };
      delete next[id];
      return next;
    });
  };

  const handleDownload = (doc) => {
    const realFile = filesById[doc.id];
    if (realFile){
      const url = URL.createObjectURL(realFile);
      const a = document.createElement("a");
      a.href = url;
      a.download = doc.name;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    } else {
      showToast("This is a sample entry — upload a real file to enable download");
    }
  };

  const onDrop = (e) => {
    e.preventDefault();
    setDragOver(false);
    if (e.dataTransfer.files && e.dataTransfer.files.length){
      addFiles(e.dataTransfer.files);
    }
  };

  const counts = useMemo(() => {
    const c = { all: docs.length, excel: 0, pbi: 0 };
    docs.forEach(d => { c[d.type] = (c[d.type] || 0) + 1; });
    return c;
  }, [docs]);

  const totalSize = useMemo(() => docs.reduce((s,d) => s + d.size, 0), [docs]);

  const visibleDocs = useMemo(() => {
    let list = docs;
    if (activeFilter !== "all") list = list.filter(d => d.type === activeFilter);
    if (query.trim()){
      const q = query.trim().toLowerCase();
      list = list.filter(d => d.name.toLowerCase().includes(q));
    }
    list = [...list];
    if (sortBy === "recent") list.sort((a,b) => b.added - a.added);
    if (sortBy === "name") list.sort((a,b) => a.name.localeCompare(b.name));
    if (sortBy === "size") list.sort((a,b) => b.size - a.size);
    return list;
  }, [docs, activeFilter, query, sortBy]);

  return (
    <React.Fragment>
      {/* Top bar */}
      <div className="topbar">
        <div className="container-fluid shell">
          <div className="d-flex align-items-center gap-3 py-3 flex-wrap">
            <div className="d-flex align-items-center gap-2">
              <div className="brand-mark"></div>
              <div>
                <div className="brand-title">Ledger</div>
                <div className="brand-sub">Excel &amp; Power BI Vault</div>
              </div>
            </div>

            <div className="search-wrap flex-grow-1 mx-lg-4 order-3 order-lg-2" style={{minWidth:"220px"}}>
              <input
                type="text"
                className="form-control"
                placeholder="Search documents by name…"
                value={query}
                onChange={e => setQuery(e.target.value)}
              />
            </div>

            <div className="order-2 order-lg-3 ms-auto">
              <button
                className="btn btn-sm"
                style={{background:"var(--pbi)", color:"#1B1400", fontWeight:600, border:"none"}}
                onClick={() => fileInputRef.current.click()}
              >
                + Upload document
              </button>
              <input
                type="file"
                ref={fileInputRef}
                className="d-none"
                multiple
                accept=".xlsx,.xls,.xlsm,.csv,.pbix,.pbit"
                onChange={e => { if (e.target.files.length) addFiles(e.target.files); e.target.value = ""; }}
              />
            </div>
          </div>
        </div>
      </div>

      {/* Body */}
      <div className="container-fluid shell py-4">
        <div className="row g-4">

          {/* Sidebar */}
          <div className="col-12 col-lg-3">
            <div className="side-card p-3 mb-3">
              <div className="section-title">Index</div>
              <div className="d-flex flex-column gap-1">
                <div className={"index-tab" + (activeFilter==="all"?" active":"")} onClick={() => setActiveFilter("all")}>
                  <span className="swatch" style={{background:"var(--paper)"}}></span>
                  All documents
                  <span className="count-pill">{counts.all}</span>
                </div>
                <div className={"index-tab" + (activeFilter==="excel"?" active":"")} onClick={() => setActiveFilter("excel")}>
                  <span className="swatch" style={{background:"var(--excel)"}}></span>
                  Excel workbooks
                  <span className="count-pill">{counts.excel || 0}</span>
                </div>
                <div className={"index-tab" + (activeFilter==="pbi"?" active":"")} onClick={() => setActiveFilter("pbi")}>
                  <span className="swatch" style={{background:"var(--pbi)"}}></span>
                  Power BI reports
                  <span className="count-pill">{counts.pbi || 0}</span>
                </div>
              </div>

              <div className="ledger-stat">
                <div className="ledger-row"><span>Total entries</span><span>{docs.length}</span></div>
                <div className="ledger-row"><span>Vault size</span><span>{formatBytes(totalSize)}</span></div>
                <div className="ledger-row"><span>Last updated</span><span>{docs.length ? formatDate(docs.reduce((a,b)=> a.added > b.added ? a : b).added) : "—"}</span></div>
              </div>
            </div>

            <div
              className={"dropzone" + (dragOver ? " drag-over" : "")}
              onDragOver={e => { e.preventDefault(); setDragOver(true); }}
              onDragLeave={() => setDragOver(false)}
              onDrop={onDrop}
              onClick={() => fileInputRef.current.click()}
            >
              <div className="glyph"></div>
              <div style={{fontSize:"0.85rem", fontWeight:600, color:"var(--text)"}}>Drop files to file them</div>
              <div style={{fontSize:"0.74rem", color:"var(--text-muted)", marginTop:"4px"}}>.xlsx · .xls · .xlsm · .csv · .pbix · .pbit</div>
            </div>
          </div>

          {/* Main */}
          <div className="col-12 col-lg-9">
            <div className="d-flex align-items-center flex-wrap gap-2 mb-3">
              <div className="section-title mb-0 me-2">
                {activeFilter === "all" ? "All documents" : activeFilter === "excel" ? "Excel workbooks" : "Power BI reports"}
                {query && <span> — matching "{query}"</span>}
              </div>
              <div className="ms-auto d-flex gap-2">
                <button className={"btn toolbar-btn" + (sortBy==="recent"?" active":"")} onClick={() => setSortBy("recent")}>Recent</button>
                <button className={"btn toolbar-btn" + (sortBy==="name"?" active":"")} onClick={() => setSortBy("name")}>Name</button>
                <button className={"btn toolbar-btn" + (sortBy==="size"?" active":"")} onClick={() => setSortBy("size")}>Size</button>
              </div>
            </div>

            {visibleDocs.length === 0 ? (
              <div className="empty-state">
                <div style={{fontWeight:600, color:"var(--text)", marginBottom:"6px"}}>
                  {query ? "No documents match that search" : "Nothing filed here yet"}
                </div>
                <div style={{fontSize:"0.85rem"}}>
                  {query ? "Try a different name or clear the search." : "Drop a workbook or report on the left, or use Upload document."}
                </div>
              </div>
            ) : (
              <div className="row g-3">
                {visibleDocs.map(doc => (
                  <div className="col-12 col-sm-6 col-xl-4" key={doc.id}>
                    <DocCard doc={doc} onDelete={handleDelete} onDownload={handleDownload} />
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      </div>

      {toast && (
        <div style={{
          position:"fixed", bottom:"22px", left:"50%", transform:"translateX(-50%)",
          background:"var(--panel-2)", color:"var(--text)", border:"1px solid var(--grid-line)",
          padding:"10px 18px", borderRadius:"8px", fontSize:"0.85rem", zIndex:100,
          boxShadow:"0 10px 24px rgba(0,0,0,0.35)"
        }}>
          {toast}
        </div>
      )}
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
